<div class="contenedor">
  <form class="formulario">

    <label>Nombre completo</label>
    <input type="text" placeholder="Ingrese su nombre completo" required>

    <label>Número de identificación</label>
    <input type="number" placeholder="Ingrese su número de identificación" required>

    <label>Fecha de nacimiento</label>
    <input type="date" required>

    <label>Estado civil</label>
    <select required>
      <option value="">Seleccione</option>
      <option>Soltero/a</option>
      <option>Casado/a</option>
    </select>

    <div class="check">
      <input type="checkbox" required>
      <span>Acepto la política de tratamiento de datos (Ley 1581 de 2012)</span>
    </div>

    <button type="submit">Enviar</button>

  </form>
</div>
